# ######## Window rules ########
# Cleaned & polished for Hyprland 0.53.1+

# Opacity rules (non-fullscreen)
windowrulev2 = opacity $windowOpacity override, fullscreen:0

# Force opaque windows
windowrulev2 = opaque, class:(foot|equibop|org\.quickshell|imv|swappy)

# Center floating Wayland windows (exclude XWayland popups)
windowrulev2 = center, floating:1, xwayland:0

# ---------- Float rules ----------
windowrulev2 = float, class:(guifetch)
windowrulev2 = float, class:(yad)
windowrulev2 = float, class:(zenity)
windowrulev2 = float, class:(wev)
windowrulev2 = float, class:(org\.gnome\.FileRoller|file-roller)
windowrulev2 = float, class:(blueman-manager)
windowrulev2 = float, class:(com\.github\.GradienceTeam\.Gradience)
windowrulev2 = float, class:(feh|imv)
windowrulev2 = float, class:(system-config-printer)
windowrulev2 = float, class:(org\.quickshell)

# ---------- Float, resize & center ----------
# nmtui
windowrulev2 = float, class:(foot), title:(nmtui)
windowrulev2 = size 60% 70%, class:(foot), title:(nmtui)
windowrulev2 = center, class:(foot), title:(nmtui)

# GNOME Settings
windowrulev2 = float, class:(org\.gnome\.Settings)
windowrulev2 = size 70% 80%, class:(org\.gnome\.Settings)
windowrulev2 = center, class:(org\.gnome\.Settings)

# Pavucontrol / YAD Icon Browser
windowrulev2 = float, class:(org\.pulseaudio\.pavucontrol|yad-icon-browser)
windowrulev2 = size 60% 70%, class:(org\.pulseaudio\.pavucontrol|yad-icon-browser)
windowrulev2 = center, class:(org\.pulseaudio\.pavucontrol|yad-icon-browser)

# nwg-look
windowrulev2 = float, class:(nwg-look)
windowrulev2 = size 50% 60%, class:(nwg-look)
windowrulev2 = center, class:(nwg-look)

# ---------- Special workspaces ----------
windowrulev2 = workspace special:sysmon, class:(btop)
windowrulev2 = workspace special:music, class:(feishin|Spotify|Supersonic|Cider)
windowrulev2 = workspace special:music, initialTitle:(Spotify( Free)?)
windowrulev2 = workspace special:communication, class:(discord|equibop|vesktop|whatsapp)
windowrulev2 = workspace special:todo, class:(Todoist)

# ---------- Dialogs ----------
windowrulev2 = float, title:(Select|Open)( a)? (File|Folder)(s)?
windowrulev2 = float, title:File (Operation|Upload)( Progress)?
windowrulev2 = float, title:.* Properties
windowrulev2 = float, title:Export Image as PNG
windowrulev2 = float, title:GIMP Crash Debug
windowrulev2 = float, title:Save As
windowrulev2 = float, title:Library

# ---------- Picture-in-Picture ----------
windowrulev2 = move 100%-w-2% 100%-w-3%, title:Picture(-| )in(-| )[Pp]icture
windowrulev2 = keepaspectratio, title:Picture(-| )in(-| )[Pp]icture
windowrulev2 = float, title:Picture(-| )in(-| )[Pp]icture
windowrulev2 = pin, title:Picture(-| )in(-| )[Pp]icture

# ---------- Steam ----------
windowrulev2 = prop rounding 10, title:^$, class:(steam)
windowrulev2 = float, title:Friends List, class:(steam)
windowrulev2 = prop immediate, class:(steam_app_[0-9]+)
windowrulev2 = idleinhibit always, class:(steam_app_[0-9]+)

# ---------- ATLauncher ----------
windowrulev2 = float, class:(com-atlauncher-App), title:(ATLauncher Console)

# ---------- Autodesk Fusion 360 ----------
windowrulev2 = prop noblur, class:(fusion360\.exe), title:(Fusion360|(Marking Menu))

# ---------- XWayland popups ----------
windowrulev2 = prop nodim, xwayland:1, title:(win[0-9]+)
windowrulev2 = prop noshadow, xwayland:1, title:(win[0-9]+)
windowrulev2 = prop rounding 10, xwayland:1, title:(win[0-9]+)

# ######## Workspace rules ########
workspace = w[tv1]s[false], gapsout:$singleWindowGapsOut
workspace = f[1]s[false], gapsout:$singleWindowGapsOut

# ######## Layer rules ########

# Generic fades
layerrulev2 = animation fade, layer:hyprpicker
layerrulev2 = animation fade, layer:logout_dialog
layerrulev2 = animation fade, layer:selection
layerrulev2 = animation fade, layer:wayfreeze

# Fuzzel
layerrulev2 = animation popin 80%, layer:launcher
layerrulev2 = blur, layer:launcher

# Shell / Caelestia
layerrulev2 = noanim, layer:caelestia-(border-exclusion|area-picker)
layerrulev2 = animation fade, layer:caelestia-(drawers|background)
layerrulev2 = blur, layer:caelestia-drawers
layerrulev2 = ignorealpha 0.57, layer:caelestia-drawers

# Force Discord dans communication workspace
windowrulev2 = workspace special:communication, class:(discord)
windowrulev2 = workspace special:communication, class:(vesktop)
windowrulev2 = workspace special:communication, initialTitle:(Discord)

# Force Spotify dans music workspace  
windowrulev2 = workspace special:music, class:(Spotify)
windowrulev2 = workspace special:music, initialTitle:(Spotify)
